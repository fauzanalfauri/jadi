<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis PAI: Etos Kerja Islam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <div id="start-screen" class="screen">
            <h1>✨ Kuis PAI: Etos Kerja ✨</h1>
            <p>Uji pemahamanmu tentang konsep kerja keras, kemandirian, dan tanggung jawab dalam Islam.</p>
            <button id="start-btn" class="btn">Mulai Kuis 🚀</button>
        </div>

        <div id="quiz-screen" class="screen hide">
            <div class="quiz-header">
                <span id="progress">Soal 1 dari 10</span>
                <span id="score-counter">Skor: 0</span>
            </div>
            <div id="question" class="question-text">Pertanyaan akan muncul di sini...</div>
            <div id="options" class="options-container">
                </div>
            <div id="feedback" class="feedback-box hide">
                <p id="feedback-text"></p>
                <p id="education-text" class="edu-text"></p>
                <button id="next-btn" class="btn">Lanjut ➡️</button>
            </div>
        </div>

        <div id="result-screen" class="screen hide">
            <h2>🎉 Hasil Akhir Kuis 🎉</h2>
            <div class="result-score">
                <span id="final-score">0</span> / 10
            </div>
            <p id="result-message">Pesan evaluasi...</p>
            <button id="restart-btn" class="btn">Coba Lagi 🔄</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
